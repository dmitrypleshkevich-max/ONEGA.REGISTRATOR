<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистратор паллет</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <header>
        <div>
            <h1>📦 Регистратор паллет</h1>
            <span>Version 0.1</span>
        </div>
        <div id="goodsStatus">goods.csv не загружен</div>
    </header>

    <nav>
        <button class="tabButton active" data-tab="scanTab">Сканирование</button>
        <button class="tabButton" data-tab="summaryTab">Сводка</button>
        <button class="tabButton" data-tab="settingsTab">Настройки</button>
    </nav>

    <main>
        <section id="scanTab" class="tab active">
            <div class="card">
                <div class="field">
                    <label>Код контейнера</label>
                    <div class="inputRow">
                        <input id="containerInput" type="text" autocomplete="off">
                        <button class="cameraButton">📷</button>
                    </div>
                </div>
                <div class="field hidden" id="ssccFieldWrapper">
                    <label>Код SSCC</label>
                    <div class="inputRow">
                        <input id="ssccInput" type="text" autocomplete="off">
                        <button class="cameraButton">📷</button>
                    </div>
                </div>
            </div>
            <div class="card"><div id="status">Введите код контейнера</div></div>
            <div class="card"><div class="stat">Паллет зарегистрировано: <strong id="palletCount">0</strong></div></div>
        </section>

        <section id="summaryTab" class="tab">
            <div class="card">
                <div class="stat">Всего паллет: <strong id="summaryCount">0</strong></div>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>Наименование</th><th>Паллет</th><th>SSCC</th></tr></thead>
                    <tbody id="summaryTable"><tr><td colspan="3">Нет данных</td></tr></tbody>
                </table>
            </div>
        </section>

        <section id="settingsTab" class="tab">
            <div class="card">
                <h2>Настройки</h2>
                <p>goods.csv: <span id="settingsGoods">не загружен</span></p>
            </div>
        </section>
    </main>

    <footer>Регистратор паллет © 2026</footer>
</div>

<script src="app.js"></script>
</body>
</html>
