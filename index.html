<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистратор отгрузки Азбука Снеков</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <header>
        <h1>📦 Регистратор паллет АзбукаСнеков</h1>
        <div id="goodsStatus">Загрузка данных...</div>
    </header>

    <nav>
        <button class="tabButton active" data-tab="scanTab">Сканирование</button>
        <button class="tabButton" data-tab="summaryTab">Сводка</button>
    </nav>

    <main>
        <section id="scanTab" class="tab active">
            <div class="card">
                <label>Номер задания:</label>
                <input id="jobNameInput" type="text" placeholder="Введите имя задания..." style="width:100%; padding:10px; margin-bottom:15px;">
                
                <label>Код контейнера</label>
                <input id="containerInput" type="text" autocomplete="off" style="width:100%; padding:10px;">
                
                <div id="foundedContainer" style="font-weight:bold; margin:15px 0; min-height: 20px;"></div>
                
                <div class="field hidden" id="ssccFieldWrapper">
                    <label>Код SSCC</label>
                    <input id="ssccInput" type="text" autocomplete="off" style="width:100%; padding:10px;">
                </div>
            </div>
            <div class="card"><div id="status">Введите номер задания и сканируйте контейнер</div></div>
        </section>

        <section id="summaryTab" class="tab">
    <div class="card">
        <h3>Итоги</h3>
        <div class="stat">Всего контейнеров: <strong id="summaryCount">0</strong></div>
        <div class="stat">SSCC (уник/всего): <strong id="summarySSCC">0/0</strong></div>
        <!-- НОВЫЙ ЭЛЕМЕНТ ДЛЯ ИТОГА ШТУК -->
        <div class="stat">Всего штук: <strong id="summaryTotalQty">0</strong></div>
        
        <table border="1" width="100%" style="margin-top:10px;">
            <thead><tr><th>Товар</th><th>Паллет</th><th>Кол-во</th></tr></thead>
            <tbody id="summaryTable"><tr><td colspan="3">Нет данных</td></tr></tbody>
        </table>
        
        <!-- НОВАЯ КНОПКА -->
        <button id="sendBtn" style="width: 100%; margin-top: 20px; background: #2e8b57; font-size: 16px;">Отправить результат</button>
    </div>
</section>
    </main>
</div>
<script src="app.js"></script>
</body>
</html>
