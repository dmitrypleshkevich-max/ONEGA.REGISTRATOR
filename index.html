<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистратор паллет</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <header>
        <div>
            <h1>📦 Регистратор паллет</h1>
            <span>Version 0.2</span>
        </div>
        <div id="goodsStatus">Загрузка...</div>
    </header>

    <nav>
        <button class="tabButton active" data-tab="scanTab">Сканирование</button>
        <button class="tabButton" data-tab="summaryTab">Сводка</button>
    </nav>

    <main>
        <!-- Вкладка настроек/старта -->
        <section id="settingsTab" class="tab active">
            <div class="card">
                <h2>Начало работы</h2>
                <button onclick="startJob()" style="width:100%; padding:20px; font-size:20px;">Начать задание</button>
            </div>
        </section>

        <section id="scanTab" class="tab">
            <div class="card">
                <div class="field">
                    <label>Код контейнера</label>
                    <div class="inputRow">
                        <input id="containerInput" type="text" autocomplete="off">
                    </div>
                </div>
                <div id="foundedContainer" style="font-weight:bold; margin-bottom:10px; color:#294c7a;"></div>
                <div class="field hidden" id="ssccFieldWrapper">
                    <label>Код SSCC</label>
                    <div class="inputRow">
                        <input id="ssccInput" type="text" autocomplete="off">
                    </div>
                </div>
            </div>
            <div class="card"><div id="status">Нажмите "Начать задание"</div></div>
            <div class="card"><div class="stat">Всего контейнеров: <strong id="palletCount">0</strong></div></div>
        </section>

        <section id="summaryTab" class="tab">
            <div class="card">
                <div class="stat">Всего контейнеров: <strong id="summaryCount">0</strong></div>
                <div class="stat">SSCC: <strong id="summarySSCC">0</strong></div>
            </div>
            <button style="width:100%; background:#2e8b57;">Отправить</button>
        </section>
    </main>

    <script src="app.js"></script>
    <script>
        // Переключение вкладок (базовая логика)
        document.querySelectorAll(".tabButton").forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
                document.getElementById(btn.dataset.tab).classList.add("active");
            }
        });
    </script>
</body>
</html>
